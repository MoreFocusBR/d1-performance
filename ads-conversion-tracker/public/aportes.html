<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Aportes - D1 Fitness</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0d0d1a;color:#fff;min-height:100vh}

        /* HEADER */
        .header{background:#141425;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e1e35}
        .header-left{display:flex;align-items:center;gap:16px}
        .logo{font-size:22px;font-weight:800;letter-spacing:1px}
        .logo .d{color:#FF6B35}.logo .rest{color:#fff}
        .header-title{font-size:12px;font-weight:600;color:#8888aa;text-transform:uppercase;letter-spacing:2px}

        /* CONTAINER */
        .container{max-width:1000px;margin:0 auto;padding:20px}

        /* CARD */
        .card{background:#141425;border-radius:12px;padding:20px;margin-bottom:20px;position:relative;overflow:hidden;border:1px solid #1e1e35}
        .card::before{content:'';position:absolute;inset:0;border-radius:12px;padding:1px;background:linear-gradient(135deg,#FF6B35 0%,#FF6B35 30%,transparent 60%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
        .card.border-blue::before{background:linear-gradient(135deg,#4488ff 0%,#4488ff 30%,transparent 60%)}
        .card-title{font-size:18px;font-weight:700;margin-bottom:16px}

        /* FORM */
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:13px;font-weight:600;color:#8888aa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
        .form-group input,.form-group textarea{width:100%;padding:10px 12px;background:#0d0d1a;border:1px solid #2a2a45;border-radius:8px;color:#fff;font-size:13px;font-family:inherit}
        .form-group input:focus,.form-group textarea:focus{outline:none;border-color:#FF6B35}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .form-row.full{grid-template-columns:1fr}

        /* BUTTONS */
        .btn{padding:10px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
        .btn-primary{background:#FF6B35;color:#fff}
        .btn-primary:hover{background:#ff5520;box-shadow:0 5px 15px rgba(255,107,53,.3)}
        .btn-secondary{background:#1e1e35;color:#ccc;border:1px solid #2a2a45}
        .btn-secondary:hover{background:#2a2a45;color:#fff}
        .btn-danger{background:#ff4466;color:#fff}
        .btn-danger:hover{background:#ff2244}
        .btn-sm{padding:6px 12px;font-size:12px}

        /* TABLE */
        .table-container{overflow-x:auto}
        table{width:100%;border-collapse:collapse;margin-top:16px}
        th{background:#1e1e35;padding:12px;text-align:left;font-size:12px;font-weight:600;color:#8888aa;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #2a2a45}
        td{padding:12px;border-bottom:1px solid #1e1e35;font-size:13px}
        tr:hover{background:#1e1e35}
        .currency{color:#FF6B35;font-weight:600}
        .date{color:#8888aa}

        /* MODAL */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;align-items:center;justify-content:center}
        .modal.show{display:flex}
        .modal-content{background:#141425;border-radius:12px;padding:24px;max-width:500px;width:90%;border:1px solid #2a2a45}
        .modal-header{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
        .modal-close{background:none;border:none;color:#8888aa;font-size:24px;cursor:pointer}
        .modal-close:hover{color:#fff}

        /* MESSAGE */
        .message{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;font-weight:600;display:none}
        .message.show{display:block}
        .message.success{background:#22884455;color:#44cc88;border:1px solid #228844}
        .message.error{background:#ff446655;color:#ff88aa;border:1px solid #ff4466}

        /* LOADING */
        .loading{text-align:center;padding:40px;color:#8888aa}
        .spinner{display:inline-block;width:30px;height:30px;border:3px solid #2a2a45;border-top:3px solid #FF6B35;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* RESPONSIVE */
        @media(max-width:768px){
            .form-row{grid-template-columns:1fr}
            table{font-size:12px}
            td,th{padding:8px}
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <div class="logo"><span class="d">D1</span><span class="rest">FITNESS</span></div>
        <div class="header-title">Gerenciamento de Aportes</div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

    <!-- MESSAGE -->
    <div class="message" id="message"></div>

    <!-- FORM -->
    <div class="card">
        <div class="card-title">Adicionar Novo Aporte</div>
        <form id="aportForm" novalidate>
            <div class="form-row">
                <div class="form-group">
                    <label for="utm_campaign">Nome da Campanha *</label>
                    <input type="text" id="utm_campaign" placeholder="ex: meta-b2b-sac-lp-astec" required>
                </div>
                <div class="form-group">
                    <label for="origem">Origem/Canal *</label>
                    <input type="text" id="origem" placeholder="ex: Meta, Facebook, Instagram" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="valor_aporte">Valor do Aporte (R$) *</label>
                    <input type="number" id="valor_aporte" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="data_aporte">Data do Aporte *</label>
                    <input type="date" id="data_aporte" required>
                </div>
            </div>
            <div class="form-row full">
                <div class="form-group">
                    <label for="descricao">Descrição (opcional)</label>
                    <textarea id="descricao" placeholder="Notas adicionais sobre este aporte..." rows="3"></textarea>
                </div>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button type="reset" class="btn btn-secondary">Limpar</button>
                <button type="submit" class="btn btn-primary">Adicionar Aporte</button>
            </div>
        </form>
    </div>

    <!-- LISTA DE APORTES -->
    <div class="card border-blue">
        <div class="card-title">Aportes Registrados</div>
        <div class="table-container">
            <table id="aportesTable">
                <thead>
                    <tr>
                        <th>Campanha</th>
                        <th>Canal</th>
                        <th>Valor</th>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="aportesBody">
                    <tr><td colspan="6" style="text-align:center;padding:40px"><div class="spinner"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- MODAL EDITAR -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <span>Editar Aporte</span>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <form id="editForm" novalidate>
            <input type="hidden" id="editId">
            <div class="form-group">
                <label for="edit_utm_campaign">Nome da Campanha *</label>
                <input type="text" id="edit_utm_campaign" required>
            </div>
            <div class="form-group">
                <label for="edit_origem">Origem/Canal *</label>
                <input type="text" id="edit_origem" required>
            </div>
            <div class="form-group">
                <label for="edit_valor_aporte">Valor do Aporte (R$) *</label>
                <input type="number" id="edit_valor_aporte" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label for="edit_data_aporte">Data do Aporte *</label>
                <input type="date" id="edit_data_aporte" required>
            </div>
            <div class="form-group">
                <label for="edit_descricao">Descrição</label>
                <textarea id="edit_descricao" rows="3"></textarea>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>

<script>
const AUTH_KEY = 'admin_authenticated';

// Check auth
if (sessionStorage.getItem(AUTH_KEY) !== 'true') {
    window.location.href = '/admin';
}

// Format currency
function formatCurrency(v) {
    return 'R$ ' + parseFloat(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// Format date
function formatDate(d) {
    if (!d) return '--';
    return new Date(d).toLocaleDateString('pt-BR');
}

// Show message
function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = 'message show ' + type;
    setTimeout(() => msg.classList.remove('show'), 4000);
}

// Load aportes
async function loadAportes() {
    try {
        const res = await fetch('/api/aportes?limit=1000');
        const data = await res.json();

        if (!data.success) {
            showMessage('Erro ao carregar aportes', 'error');
            return;
        }

        const tbody = document.getElementById('aportesBody');
        if (!data.aportes || data.aportes.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#666">Nenhum aporte registrado</td></tr>';
            return;
        }

        tbody.innerHTML = data.aportes.map(a => `
            <tr>
                <td><strong>${a.utm_campaign}</strong></td>
                <td>${a.origem}</td>
                <td class="currency">${formatCurrency(a.valor_aporte)}</td>
                <td class="date">${formatDate(a.data_aporte)}</td>
                <td>${a.descricao || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-secondary" onclick="editAporte(${a.id})">Editar</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteAporte(${a.id})">Deletar</button>
                </td>
            </tr>
        `).join('');
    } catch (err) {
        console.error('Error loading aportes:', err);
        showMessage('Erro ao carregar aportes', 'error');
    }
}

// Create aporte
document.getElementById('aportForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const aporte = {
        utm_campaign: document.getElementById('utm_campaign').value.trim(),
        origem: document.getElementById('origem').value.trim(),
        valor_aporte: parseFloat(document.getElementById('valor_aporte').value),
        data_aporte: document.getElementById('data_aporte').value,
        descricao: document.getElementById('descricao').value.trim() || null,
        created_by: 'admin'
    };

    try {
        const res = await fetch('/api/aportes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(aporte)
        });

        const data = await res.json();

        if (!data.success) {
            showMessage(data.error || 'Erro ao criar aporte', 'error');
            return;
        }

        showMessage('Aporte criado com sucesso!', 'success');
        document.getElementById('aportForm').reset();
        loadAportes();
    } catch (err) {
        console.error('Error creating aporte:', err);
        showMessage('Erro ao criar aporte', 'error');
    }
});

// Edit aporte
async function editAporte(id) {
    try {
        const res = await fetch(`/api/aportes/${id}`);
        const data = await res.json();

        if (!data.success) {
            showMessage('Erro ao carregar aporte', 'error');
            return;
        }

        const a = data.aporte;
        document.getElementById('editId').value = id;
        document.getElementById('edit_utm_campaign').value = a.utm_campaign;
        document.getElementById('edit_origem').value = a.origem;
        document.getElementById('edit_valor_aporte').value = a.valor_aporte;
        document.getElementById('edit_data_aporte').value = a.data_aporte;
        document.getElementById('edit_descricao').value = a.descricao || '';

        document.getElementById('editModal').classList.add('show');
    } catch (err) {
        console.error('Error loading aporte:', err);
        showMessage('Erro ao carregar aporte', 'error');
    }
}

// Update aporte
document.getElementById('editForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const id = document.getElementById('editId').value;
    const aporte = {
        utm_campaign: document.getElementById('edit_utm_campaign').value.trim(),
        origem: document.getElementById('edit_origem').value.trim(),
        valor_aporte: parseFloat(document.getElementById('edit_valor_aporte').value),
        data_aporte: document.getElementById('edit_data_aporte').value,
        descricao: document.getElementById('edit_descricao').value.trim() || null
    };

    try {
        const res = await fetch(`/api/aportes/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(aporte)
        });

        const data = await res.json();

        if (!data.success) {
            showMessage(data.error || 'Erro ao atualizar aporte', 'error');
            return;
        }

        showMessage('Aporte atualizado com sucesso!', 'success');
        closeModal();
        loadAportes();
    } catch (err) {
        console.error('Error updating aporte:', err);
        showMessage('Erro ao atualizar aporte', 'error');
    }
});

// Delete aporte
async function deleteAporte(id) {
    if (!confirm('Tem certeza que deseja deletar este aporte?')) return;

    try {
        const res = await fetch(`/api/aportes/${id}`, { method: 'DELETE' });
        const data = await res.json();

        if (!data.success) {
            showMessage(data.error || 'Erro ao deletar aporte', 'error');
            return;
        }

        showMessage('Aporte deletado com sucesso!', 'success');
        loadAportes();
    } catch (err) {
        console.error('Error deleting aporte:', err);
        showMessage('Erro ao deletar aporte', 'error');
    }
}

// Modal
function closeModal() {
    document.getElementById('editModal').classList.remove('show');
}

window.onclick = (e) => {
    const modal = document.getElementById('editModal');
    if (e.target === modal) modal.classList.remove('show');
};

// Init
document.addEventListener('DOMContentLoaded', loadAportes);
</script>
</body>
</html>
